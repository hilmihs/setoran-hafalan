trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  - group: Maahir-Prod # Gunakan prefix ENV_

pool:
  vmImage: ubuntu-latest

steps:
  - task: Bash@3
    displayName: "🔧 Generate exportable ENV from Variable Group"
    inputs:
      targetType: "inline"
      script: |
        echo "🔄 Export Azure DevOps Variable Group with prefix ENV_"
        printenv | grep '^ENV_' | while IFS='=' read -r key value; do
          safe_value=$(python3 -c "import json, os; print(json.dumps(os.getenv('$key')))")
          echo "export $key=$safe_value"
        done > env_vars.sh

        chmod +x env_vars.sh
        cat env_vars.sh
  #⬇️ Kirim env_vars.sh ke server via SCP
  - task: CopyFilesOverSSH@0
    displayName: "📤 Upload env_vars.sh to server"
    inputs:
      sshEndpoint: "server-staging@103.181.142.223"
      sourceFolder: "."
      contents: "env_vars.sh"
      targetFolder: "/var/www/html/maahir"
      cleanTargetFolder: false
      overwrite: true
  - task: Ssh@0
    displayName: "🔧 Ensure nginx upload limit (audio rekaman ~14MB)"
    inputs:
      sshEndpoint: "server-staging@103.181.142.223"
      runOptions: "inline"
      failOnStdErr: false
      inline: |
        NGINX_SNIPPET="/etc/nginx/conf.d/maahir-upload-limit.conf"
        if [ ! -f "$NGINX_SNIPPET" ]; then
          echo "client_max_body_size 64m;" | sudo tee "$NGINX_SNIPPET"
          sudo nginx -t && sudo systemctl reload nginx
          echo "✅ nginx client_max_body_size 64m set"
        else
          echo "✅ nginx upload limit sudah ada, skip"
        fi
  - task: Ssh@0
    displayName: "📁 Ensure audio storage dir writable (filesystem migration)"
    inputs:
      sshEndpoint: "server-staging@103.181.142.223"
      runOptions: "inline"
      failOnStdErr: false
      inline: |
        # Storage audio pindah Supabase→filesystem. Service next-maahir jalan root,
        # jadi cukup pastikan folder ada (writeFile root ke dir root = OK).
        sudo mkdir -p /var/www/html/maahir/storage/setoran-audio
        # Service next-maahir jalan sbg user NON-root (probe /api/health kasih EACCES),
        # jadi 0775 root:root tak cukup. 0777 supaya user service bisa tulis audio.
        # Dir ini di balik auth app (/api/audio HMAC), bukan diekspos langsung.
        sudo chmod -R 0777 /var/www/html/maahir/storage
        echo "✅ storage dir:"; ls -ld /var/www/html/maahir/storage /var/www/html/maahir/storage/setoran-audio
        df -h /var/www/html/maahir/storage | tail -1
  - task: Ssh@0
    displayName: "🚀 Deploy Next.js Frontend (atomic + rollback — nol window chunk-500)"
    inputs:
      sshEndpoint: "server-staging@103.181.142.223"
      runOptions: "inline"
      failOnStdErr: false
      inline: |
        echo "🚀 START: Deploy Next.js Frontend (atomic, hardened)"
        set -eu

        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

        LIVE=/var/www/html/maahir
        BUILD=/var/www/html/maahir-build
        SERVICE=next-maahir

        # ── 0) Preflight disk (info; tak hard-block) ────────────────────────
        echo "💽 Disk (butuh ruang utk salinan build kedua):"
        df -h "$LIVE" | tail -1

        # ── 1) BUILD di direktori TERPISAH ──────────────────────────────────
        # Kunci fix: service lama di $LIVE terus melayani & $LIVE/.next TAK
        # disentuh selama build (beberapa menit). Pipeline lama menghapus
        # $LIVE/.next di awal (`rm -rf .next`) → tiap request chunk yang belum
        # ter-cache balas 500 (ChunkLoadError) selama durasi build.
        # Bonus: $BUILD/.next tak pernah dilayani service → tak ada cache runtime
        # root-owned yang memblok rebuild (alasan asli `sudo rm -rf .next`).
        if [ ! -d "$BUILD/.git" ]; then
          sudo rm -rf "$BUILD"
          git clone "$LIVE" "$BUILD"
        fi
        cd "$BUILD"
        git remote set-url origin "$(git -C "$LIVE" config --get remote.origin.url)"
        git fetch origin main
        git reset --hard origin/main
        echo "📌 Build commit: $(git log -1 --oneline)"

        # `next build` butuh SESSION_SECRET saat build (throw module-level di
        # session.ts). Prod menyuplainya lewat file .env* (BUKAN env_vars.sh yang
        # ber-prefix ENV_). Salin file env dari live agar identik. Bila tak ada →
        # build gagal di sini (set -eu) SEBELUM menyentuh live → live aman.
        cp "$LIVE"/.env* "$BUILD"/ 2>/dev/null || true

        echo "📦 npm install (build dir)"
        nvm exec 24.15.0 npm install

        echo "⚙️ Build (di $BUILD — $LIVE tetap melayani)"
        nvm exec 24.15.0 npm run build
        # `npm run build` menjalankan `postbuild` → salin .next/static + public
        # ke .next/standalone (self-complete; hash server↔static dari build SAMA).

        # Sanity artefak SEBELUM menyentuh live (gagal → exit, live tetap hidup)
        test -f "$BUILD/.next/standalone/server.js"
        test -d "$BUILD/.next/standalone/.next/static"

        # ── 2) STAGE ke filesystem $LIVE (live masih serve .next lama) ───────
        # cp ke .next.new (bukan mv) → dijamin berada di FS yang SAMA dengan
        # $LIVE, sehingga rename final pasti atomik walau $BUILD beda mount.
        echo "📦 Stage artefak ke $LIVE/.next.new"
        sudo rm -rf "$LIVE/.next.new"
        sudo cp -a "$BUILD/.next" "$LIVE/.next.new"

        # ── 3) SWAP ATOMIK dalam $LIVE (rename same-FS = instan) ─────────────
        sudo rm -rf "$LIVE/.next.old"
        if [ -d "$LIVE/.next" ]; then sudo mv "$LIVE/.next" "$LIVE/.next.old"; fi
        sudo mv "$LIVE/.next.new" "$LIVE/.next"

        # Sinkron source live (hygiene; tak menyentuh .next runtime)
        cd "$LIVE"
        git fetch origin main
        git reset --hard origin/main

        # ── 4) Restart + health-check + ROLLBACK bila gagal ─────────────────
        echo "🔄 restart $SERVICE (downtime ~2 detik)"
        sudo systemctl restart "$SERVICE"
        sleep 3
        if ! sudo systemctl is-active --quiet "$SERVICE"; then
          echo "❌ $SERVICE tidak aktif setelah restart → ROLLBACK ke versi lama"
          sudo rm -rf "$LIVE/.next"
          if [ -d "$LIVE/.next.old" ]; then sudo mv "$LIVE/.next.old" "$LIVE/.next"; fi
          sudo systemctl restart "$SERVICE"
          sudo systemctl status "$SERVICE" --no-pager | head -6
          exit 1
        fi

        sudo systemctl status "$SERVICE" --no-pager | head -6
        sudo rm -rf "$LIVE/.next.old"
        echo "✅ Deploy selesai — build di luar live, swap atomik, rollback-on-fail aktif"
