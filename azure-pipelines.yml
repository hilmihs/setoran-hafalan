trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  - group: Maahir-Prod # Gunakan prefix ENV_

pool:
  vmImage: ubuntu-latest

steps:
  - task: Bash@3
    displayName: "🔧 Generate exportable ENV from Variable Group"
    inputs:
      targetType: "inline"
      script: |
        echo "🔄 Export Azure DevOps Variable Group with prefix ENV_"
        printenv | grep '^ENV_' | while IFS='=' read -r key value; do
          safe_value=$(python3 -c "import json, os; print(json.dumps(os.getenv('$key')))")
          echo "export $key=$safe_value"
        done > env_vars.sh

        chmod +x env_vars.sh
        cat env_vars.sh
  #⬇️ Kirim env_vars.sh ke server via SCP
  - task: CopyFilesOverSSH@0
    displayName: "📤 Upload env_vars.sh to server"
    inputs:
      sshEndpoint: "server-staging@103.181.142.223"
      sourceFolder: "."
      contents: "env_vars.sh"
      targetFolder: "/var/www/html/maahir"
      cleanTargetFolder: false
      overwrite: true
  - task: Ssh@0
    displayName: "🔧 Ensure nginx upload limit (audio rekaman ~14MB)"
    inputs:
      sshEndpoint: "server-staging@103.181.142.223"
      runOptions: "inline"
      failOnStdErr: false
      inline: |
        NGINX_SNIPPET="/etc/nginx/conf.d/maahir-upload-limit.conf"
        if [ ! -f "$NGINX_SNIPPET" ]; then
          echo "client_max_body_size 64m;" | sudo tee "$NGINX_SNIPPET"
          sudo nginx -t && sudo systemctl reload nginx
          echo "✅ nginx client_max_body_size 64m set"
        else
          echo "✅ nginx upload limit sudah ada, skip"
        fi
  - task: Ssh@0
    displayName: "🚀 Deploy Next.js Frontend"
    inputs:
      sshEndpoint: "server-staging@103.181.142.223"
      runOptions: "inline"
      failOnStdErr: false
      inline: |
        echo "🚀 START: Deploy Next.js Frontend"
        set -euo pipefail 2>/dev/null || set -eu

        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

        cd /var/www/html/maahir
        echo "📂 Current folder: $(pwd)"

        echo "⬇️ Git sync Web Maahir (strict)"
        git fetch origin main
        git reset --hard origin/main
        echo "📌 Deployed commit: $(git log -1 --oneline)"

        echo "📦 Install dependency Web Maahir"
        nvm exec 24.15.0 npm install

        echo "📦 stop service"
        sudo systemctl stop next-maahir
        
        echo "🧹 Clean .next lama (file cache runtime standalone bisa owned by root)"
        sudo rm -rf .next

        echo "⚙️ Build Web Maahir"
        nvm exec 24.15.0 npm run build

        echo "📁 Copy static files to standalone folder"
        cp -r .next/static .next/standalone/.next/

        echo "🔄 start systemd service"
        sudo systemctl start next-maahir
        sudo systemctl status next-maahir --no-pager

        echo "✅ Next.js frontend deployment selesai"